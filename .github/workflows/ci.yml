name: CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # Based on .clinerules/rules.md
          extensions: intl, pdo_mysql, mbstring, zip
          ini-values: memory_limit=-1
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # - name: Run PHP_CodeSniffer
      #   run: composer run cs-check

      # - name: Run PHPStan
      #   run: composer run stan

      # - name: Run tests
      #   run: composer run test

      # Bước này giúp tối ưu việc build Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: zzzueszz
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: zzzueszz/myapp:latest


          # Add other Cline CLI arguments as needed for your automation task
          # For example:
          # command: 'pr-review'
          # args: '--pr-url ${{ github.event.pull_request.html_url }}'
